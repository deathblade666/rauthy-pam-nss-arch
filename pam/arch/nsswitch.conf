# /etc/nsswitch.conf
# Optimized for Arch Linux with systemd-homed and Rauthy

# Order: Check local files first, then Rauthy (Network), then Homed.
# This ensures managed accounts are discovered before homed tries to claim them.
passwd:     files rauthy systemd
group:      files rauthy [SUCCESS=merge] systemd

# Added rauthy to shadow so PAM can verify account status (expiry, etc.)
shadow:     files rauthy systemd
gshadow:    files systemd

# Removed rauthy from hosts to prevent potential DNS/Resolution hangs
hosts:      myhostname resolve [!UNAVAIL=return] files dns
networks:   files dns

protocols:  files
services:   files
ethers:     files
rpc:        files
netgroup:   files
